<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580.2695 360" width="580.2695" height="360" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="UI" x1="75.874" y1="70" x2="75.874" y2="330" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Host" x1="215.874" y1="70" x2="215.874" y2="330" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Bridge" x1="355.874" y1="70" x2="355.874" y2="330" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Worker" x1="495.874" y1="70" x2="495.874" y2="330" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="UI" data-to="Host" data-label="invoke(&quot;backend_request&quot;, { method, params })" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="75.874" y1="90" x2="215.874" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="145.874" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">invoke(&quot;backend_request&quot;, { method, params })</text>
</g>
<g class="message" data-from="Host" data-to="Bridge" data-label="JSON over Unix socket" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="215.874" y1="130" x2="355.874" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="285.874" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">JSON over Unix socket</text>
</g>
<g class="message" data-from="Bridge" data-to="Worker" data-label="handleRequest(method, params)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="355.874" y1="170" x2="495.874" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="425.874" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">handleRequest(method, params)</text>
</g>
<g class="message" data-from="Worker" data-to="Bridge" data-label="{ ok, result }" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="495.874" y1="210" x2="355.874" y2="210" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="425.874" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">{ ok, result }</text>
</g>
<g class="message" data-from="Bridge" data-to="Host" data-label="{ ok, result }" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="355.874" y1="250" x2="215.874" y2="250" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="285.874" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">{ ok, result }</text>
</g>
<g class="message" data-from="Host" data-to="UI" data-label="command result" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="215.874" y1="290" x2="75.874" y2="290" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="145.874" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">command result</text>
</g>
<g class="actor" data-id="UI" data-label="Renderer" data-type="participant">
  <rect x="30" y="30" width="91.74799999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="75.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Renderer</text>
</g>
<g class="actor" data-id="Host" data-label="Electron main" data-type="participant">
  <rect x="168.8885" y="30" width="93.971" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="215.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Electron main</text>
</g>
<g class="actor" data-id="Bridge" data-label="Bare host" data-type="participant">
  <rect x="310.3705" y="30" width="91.007" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="355.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Bare host</text>
</g>
<g class="actor" data-id="Worker" data-label="Facebonk manager" data-type="participant">
  <rect x="441.47850000000005" y="30" width="108.791" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="495.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Facebonk manager</text>
</g>
</svg>

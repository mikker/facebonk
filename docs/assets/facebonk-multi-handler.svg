<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 473.042 400" width="473.042" height="400" style="--bg:#f5f5f5;--fg:#333333;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="CLI" x1="81.4315" y1="70" x2="81.4315" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="ID" x1="233.9275" y1="70" x2="233.9275" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="WEB" x1="389.017" y1="70" x2="389.017" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="CLI" data-to="ID" data-label="create identity" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="81.4315" y1="90" x2="233.9275" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="157.67950000000002" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">create identity</text>
</g>
<g class="message" data-from="CLI" data-to="ID" data-label="create invite" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="81.4315" y1="130" x2="233.9275" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="157.67950000000002" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">create invite</text>
</g>
<g class="message" data-from="WEB" data-to="ID" data-label="join via invite" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="389.017" y1="170" x2="233.9275" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="311.47225000000003" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">join via invite</text>
</g>
<g class="message" data-from="CLI" data-to="ID" data-label="set profile text" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="81.4315" y1="210" x2="233.9275" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="157.67950000000002" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">set profile text</text>
</g>
<g class="message" data-from="ID" data-to="WEB" data-label="replicate profile update" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="233.9275" y1="250" x2="389.017" y2="250" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="311.47225000000003" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">replicate profile update</text>
</g>
<g class="message" data-from="WEB" data-to="ID" data-label="set avatar" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="389.017" y1="290" x2="233.9275" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="311.47225000000003" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">set avatar</text>
</g>
<g class="message" data-from="ID" data-to="CLI" data-label="replicate avatar update" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="233.9275" y1="330" x2="81.4315" y2="330" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="157.67950000000002" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">replicate avatar update</text>
</g>
<g class="actor" data-id="CLI" data-label="CLI handler" data-type="participant">
  <rect x="30" y="30" width="102.863" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="81.4315" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">CLI handler</text>
</g>
<g class="actor" data-id="ID" data-label="Shared identity" data-type="participant">
  <rect x="172.863" y="30" width="122.129" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="233.9275" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Shared identity</text>
</g>
<g class="actor" data-id="WEB" data-label="Web handler" data-type="participant">
  <rect x="334.992" y="30" width="108.05" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="389.017" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Web handler</text>
</g>
</svg>
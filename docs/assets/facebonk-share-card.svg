<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1308.9950000000001 116.9" width="1308.9950000000001" height="116.9" style="--bg:#f5f5f5;--fg:#333333;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<polyline class="edge" data-from="PROFILE" data-to="SHARE" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="203.47400000000005,58.45 251.47400000000005,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SHARE" data-to="CARD" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="374.934,58.45 422.934,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="CARD" data-to="IMPORT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="576.0340000000001,58.45 624.0340000000001,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="IMPORT" data-to="VERIFY" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="817.8890000000001,58.45 865.8890000000001,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="VERIFY" data-to="PREVIEW" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="1001.9460000000001,58.45 1049.9460000000001,58.45" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="PROFILE" data-label="Active shared profile" data-shape="rectangle">
  <rect x="40" y="40" width="163.47400000000005" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="121.73700000000002" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Active shared profile</text>
</g>
<g class="node" data-id="SHARE" data-label="shareProfile()" data-shape="rectangle">
  <rect x="251.47400000000005" y="40" width="123.46" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="313.20400000000006" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">shareProfile()</text>
</g>
<g class="node" data-id="CARD" data-label="Signed profile card" data-shape="rectangle">
  <rect x="422.934" y="40" width="153.10000000000002" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="499.48400000000004" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Signed profile card</text>
</g>
<g class="node" data-id="IMPORT" data-label="Paste or import elsewhere" data-shape="rectangle">
  <rect x="624.0340000000001" y="40" width="193.85500000000002" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="720.9615000000001" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Paste or import elsewhere</text>
</g>
<g class="node" data-id="VERIFY" data-label="Verify signature" data-shape="rectangle">
  <rect x="865.8890000000001" y="40" width="136.05700000000002" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="933.9175000000001" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Verify signature</text>
</g>
<g class="node" data-id="PREVIEW" data-label="Render trusted profile preview" data-shape="rectangle">
  <rect x="1049.9460000000001" y="40" width="219.049" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="1159.4705000000001" y="58.45" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">Render trusted profile preview</text>
</g>
</svg>
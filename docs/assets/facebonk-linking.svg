<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 505.646 400" width="505.646" height="400" style="--bg:#eff1f5;--fg:#4c4f69;--line:#9ca0b0;--accent:#8839ef;--muted:#9ca0b0;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="A" x1="91.8055" y1="70" x2="91.8055" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="I" x1="253.564" y1="70" x2="253.564" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="B" x1="414.5815" y1="70" x2="414.5815" y2="370" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="A" data-to="I" data-label="create invite" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="91.8055" y1="90" x2="253.564" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="172.68475" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">create invite</text>
</g>
<g class="message" data-from="A" data-to="I" data-label="serve and replicate" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="91.8055" y1="130" x2="253.564" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="172.68475" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">serve and replicate</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="join with invite" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="414.5815" y1="170" x2="253.564" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="334.07275" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">join with invite</text>
</g>
<g class="message" data-from="I" data-to="B" data-label="add writer + grant owner" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="253.564" y1="210" x2="414.5815" y2="210" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="334.07275" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">add writer + grant owner</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="set shared profile" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="414.5815" y1="250" x2="253.564" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="334.07275" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">set shared profile</text>
</g>
<g class="message" data-from="A" data-to="I" data-label="revoke writer if needed" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="91.8055" y1="290" x2="253.564" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="172.68475" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">revoke writer if needed</text>
</g>
<g class="message" data-from="I" data-to="B" data-label="owner removed" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="253.564" y1="330" x2="414.5815" y2="330" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="334.07275" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">owner removed</text>
</g>
<g class="actor" data-id="A" data-label="Primary device" data-type="participant">
  <rect x="30" y="30" width="123.61099999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="91.8055" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Primary device</text>
</g>
<g class="actor" data-id="I" data-label="IdentityContext" data-type="participant">
  <rect x="193.611" y="30" width="119.906" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="253.564" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">IdentityContext</text>
</g>
<g class="actor" data-id="B" data-label="Second device" data-type="participant">
  <rect x="353.517" y="30" width="122.129" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="414.5815" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Second device</text>
</g>
</svg>